<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>A-Level Report Card System</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap');

  :root{
    --navy:#1B2A4A; --navy-deep:#101B33; --gold:#C9A227; --gold-soft:#E7D9A8;
    --paper:#FAF7F0; --paper-dim:#F1ECE0; --ink:#2B2B2B; --crimson:#A6192E;
    --green:#3F6B4E; --line:#DAD2BC;
    --font-display:'Fraunces', Georgia, 'Times New Roman', serif;
    --font-body:'Inter', -apple-system, 'Segoe UI', sans-serif;
    --font-mono:'IBM Plex Mono','Courier New', monospace;
  }
  *{box-sizing:border-box;}
  body{margin:0; font-family:var(--font-body); color:var(--ink); background:var(--paper-dim);}
  ::selection{background:var(--gold-soft);}
  input,select,textarea{font-family:var(--font-body); width:100%; padding:8px 10px; border-radius:7px; border:1px solid var(--line); font-size:13.5px; background:#fff; color:var(--ink);}
  table{border-collapse:collapse; width:100%;}
  th{text-align:left; padding:10px 14px; font-size:11.5px; text-transform:uppercase; letter-spacing:.04em; color:#6b6357; font-weight:700;}
  td{padding:10px 14px; font-size:13.5px; vertical-align:top;}
  button{font-family:var(--font-body); cursor:pointer;}
  .app-root{display:flex; min-height:100vh;}
  .sidebar{width:236px; background:var(--navy); color:#fff; display:flex; flex-direction:column; padding:24px 16px; position:sticky; top:0; height:100vh; flex-shrink:0;}
  .brand{display:flex; align-items:center; gap:10px; margin-bottom:28px; padding:0 6px;}
  .brand-badge{width:36px; height:36px; border-radius:50%; border:1.5px solid var(--gold); display:flex; align-items:center; justify-content:center; font-family:var(--font-display); font-weight:700; font-size:13px; color:var(--gold); flex-shrink:0; overflow:hidden;}
  .brand-name{font-family:var(--font-display); font-size:15px; line-height:1.15; font-weight:600;}
  .role-badge{font-size:11px; color:var(--gold); text-transform:uppercase; letter-spacing:.06em; margin-top:2px;}
  .nav{display:flex; flex-direction:column; gap:2px;}
  .nav-btn{display:flex; align-items:center; gap:10px; padding:10px 12px; border-radius:8px; border:none; background:transparent; color:rgba(255,255,255,0.82); font-size:14px; font-weight:500; text-align:left;}
  .nav-btn.active{background:rgba(201,162,39,0.16); color:var(--gold); font-weight:600;}
  .nav-footer{margin-top:auto; padding-top:16px; font-size:12px; color:rgba(255,255,255,0.5);}
  .save-state{margin-top:6px; color:rgba(255,255,255,0.4);}
  .save-state.saving{color:var(--gold);}
  .logout-btn{margin-top:12px; width:100%; padding:8px 12px; border-radius:7px; border:1px solid rgba(255,255,255,0.25); background:transparent; color:rgba(255,255,255,0.75); font-size:12.5px; font-weight:600;}
  main{flex:1; min-width:0; padding:28px 32px; max-width:1100px;}
  .eyebrow{font-size:12px; letter-spacing:.08em; text-transform:uppercase; color:var(--gold); font-weight:700; margin-bottom:4px;}
  .page-title{font-family:var(--font-display); font-size:28px; font-weight:700; color:var(--navy); margin:0;}
  .page-header{display:flex; align-items:flex-end; justify-content:space-between; margin-bottom:22px; flex-wrap:wrap; gap:12px;}
  .card{background:#fff; border-radius:12px; padding:20px; border:1px solid var(--line); box-shadow:0 1px 3px rgba(27,42,74,0.05);}
  .card-flush{padding:0; overflow:hidden;}
  .section-title{font-family:var(--font-display); font-size:17px; font-weight:600; color:var(--navy); margin:0 0 14px;}
  .stat-grid{display:grid; grid-template-columns:repeat(auto-fit,minmax(180px,1fr)); gap:14px; margin-bottom:28px;}
  .stat-card{text-align:left; background:#fff; border-radius:12px; padding:20px; border:1px solid var(--line);}
  .stat-value{font-family:var(--font-display); font-size:32px; font-weight:700; color:var(--navy);}
  .stat-label{font-size:13px; color:#6b6357; margin-top:4px;}
  .btn-primary{display:inline-flex; align-items:center; gap:6px; padding:9px 16px; border-radius:7px; border:none; background:var(--navy); color:#fff; font-size:13.5px; font-weight:600;}
  .btn-secondary{display:inline-flex; align-items:center; gap:6px; padding:9px 16px; border-radius:7px; border:1px solid var(--line); background:#fff; color:var(--ink); font-size:13.5px; font-weight:600;}
  .btn-quick{padding:9px 14px; border-radius:7px; border:1px solid var(--navy); background:transparent; color:var(--navy); font-size:13.5px; font-weight:600;}
  .icon-btn{display:inline-flex; align-items:center; justify-content:center; width:28px; height:28px; border-radius:6px; border:none; background:transparent; color:var(--navy); margin-left:4px;}
  .icon-btn.danger{color:var(--crimson);}
  .pill{display:inline-block; padding:2px 9px; border-radius:20px; font-size:11.5px; font-weight:700; background:var(--paper-dim); color:var(--navy);}
  .pill.dark{background:var(--navy); color:#fff;}
  .form-row{display:block; margin-bottom:10px;}
  .form-label{font-size:12px; font-weight:600; color:#6b6357; margin-bottom:4px;}
  .form-inline{display:flex; gap:14px; flex-wrap:wrap;}
  .search-wrap{position:relative; max-width:320px; margin-bottom:16px;}
  .search-wrap input{padding-left:32px;}
  .search-icon{position:absolute; left:11px; top:11px; color:#9a9184;}
  .subject-chip{padding:6px 11px; border-radius:20px; font-size:12.5px; border:1px solid var(--line); background:#fff; color:var(--ink); font-weight:500;}
  .subject-chip.active{border-color:var(--navy); background:var(--navy); color:#fff;}
  .modal-overlay{position:fixed; inset:0; background:rgba(16,27,51,0.45); display:flex; align-items:center; justify-content:center; z-index:50; padding:20px;}
  .modal{background:#fff; border-radius:12px; padding:24px; width:100%; max-width:480px; max-height:88vh; overflow-y:auto;}
  .modal-head{display:flex; justify-content:space-between; align-items:center; margin-bottom:16px;}
  .modal-close{border:none; background:transparent; color:#6b6357; font-size:18px; line-height:1;}
  .empty-note{color:#6b6357; font-size:14px;}
  .report-card{background:#fff; border:1px solid var(--line); border-radius:4px; padding:36px 40px; max-width:760px; box-shadow:0 2px 10px rgba(27,42,74,0.06);}
  .report-head{display:flex; justify-content:space-between; align-items:flex-start; border-bottom:2px solid var(--navy); padding-bottom:18px; margin-bottom:22px;}
  .report-school{font-family:var(--font-display); font-size:24px; font-weight:700; color:var(--navy);}
  .report-motto{font-size:12.5px; font-style:italic; color:#6b6357; margin-top:2px;}
  .report-sub{font-size:12.5px; color:#6b6357; margin-top:8px; letter-spacing:.04em; text-transform:uppercase;}
  .report-seal{width:62px; height:62px; border-radius:50%; border:2px solid var(--gold); display:flex; align-items:center; justify-content:center; flex-shrink:0; font-family:var(--font-display); font-weight:700; color:var(--gold); font-size:20px; overflow:hidden;}
  .report-meta{display:grid; grid-template-columns:1fr 1fr; gap:6px 24px; font-size:13.5px; margin-bottom:22px;}
  .report-table{font-family:var(--font-mono); font-size:13px; margin-bottom:20px;}
  .report-table th{border-bottom:1.5px solid var(--navy); font-family:var(--font-body);}
  .report-table td{border-bottom:1px solid var(--line);}
  .report-table td.name-cell{font-family:var(--font-body); font-weight:600;}
  .report-totals{display:flex; gap:24px; margin-bottom:22px; font-size:13.5px;}
  .sign-row{display:flex; justify-content:space-between; margin-top:30px;}
  .sign-line{border-top:1px solid var(--ink); width:180px; padding-top:4px; font-size:12px;}
  .loading-screen{min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; background:var(--paper);}
  .loading-seal{width:64px; height:64px; border-radius:50%; border:2px solid var(--gold); display:flex; align-items:center; justify-content:center; font-family:var(--font-display); font-weight:700; color:var(--navy); letter-spacing:1px;}
  .login-screen{min-height:100vh; display:flex; align-items:center; justify-content:center; background:var(--paper-dim); padding:20px;}
  .login-card{background:#fff; border-radius:16px; padding:40px 36px; width:100%; max-width:400px; border:1px solid var(--line); box-shadow:0 4px 24px rgba(27,42,74,0.08); text-align:center;}
  .login-seal{width:56px; height:56px; border-radius:50%; border:2px solid var(--gold); display:flex; align-items:center; justify-content:center; font-family:var(--font-display); font-weight:700; color:var(--navy); margin:0 auto 16px; overflow:hidden;}
  .seal-img{width:100%; height:100%; object-fit:cover; display:block;}
  .login-title{font-family:var(--font-display); font-size:22px; font-weight:700; color:var(--navy); margin:0 0 6px;}
  .login-sub{font-size:13.5px; color:#6b6357; margin-bottom:24px;}
  .role-btn{display:flex; align-items:center; justify-content:center; gap:8px; width:100%; padding:14px 16px; border-radius:10px; border:1.5px solid var(--navy); background:#fff; color:var(--navy); font-size:14.5px; font-weight:700; margin-bottom:10px;}
  .role-btn.primary{background:var(--navy); color:#fff;}
  .teacher-select-btn{display:block; width:100%; text-align:left; padding:11px 14px; border-radius:8px; border:1px solid var(--line); background:#fff; color:var(--ink); font-size:13.5px; font-weight:600; margin-bottom:8px;}
  .login-error{color:var(--crimson); font-size:12.5px; margin-bottom:12px;}
  .login-back{background:none; border:none; color:#6b6357; font-size:12.5px; margin-top:14px; text-decoration:underline;}
  @media print{
    .no-print{display:none !important;}
    .report-card{box-shadow:none !important; margin:0 !important; border:none;}
    body{background:#fff !important;}
    main{padding:0 !important; max-width:none !important;}
  }
  @media (max-width:720px){
    .app-root{flex-direction:column;}
    .sidebar{width:100%; height:auto; position:relative; flex-direction:row; overflow-x:auto; padding:12px;}
    .nav{flex-direction:row;}
    .brand,.nav-footer{display:none;}
    main{padding:18px;}
  }
</style>
</head>
<body>

<div id="app">
  <div class="loading-screen"><div class="loading-seal">UG</div></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script>
/* ---------------------------------------------------------------------
   Uganda A-Level Report Card System — vanilla JS + Firebase
   Now with an Admin portal and a Teachers portal.

   NOTE ON SECURITY / SETUP: data is stored in Cloud Firestore and
   Admin/Teacher accounts use real Firebase Authentication (email +
   password). For this to work in your own Firebase project:
     1. Authentication → Sign-in method → enable "Email/Password"
        AND "Anonymous" (anonymous is used so the login screen and
        the Parent Portal, which has no account, can read data).
     2. Firestore Database → create a database.
     3. Firestore → Rules → restrict writes to signed-in non-anonymous
        users and allow reads to anyone signed in (anonymous included).
        Example:
          rules_version = '2';
          service cloud.firestore {
            match /databases/{database}/documents {
              match /schoolData/main {
                allow read: if request.auth != null;
                allow write: if request.auth != null && request.auth.token.firebase.sign_in_provider != 'anonymous';
              }
            }
          }
   Parent Portal logins still use the school-issued admission number
   + PIN (parents don't get their own Firebase account).
--------------------------------------------------------------------- */

const firebaseConfig = {
  apiKey: "AIzaSyC1kOC22nS_J5E-76j0W0NsmI87dFymFEU",
  authDomain: "alevel-report.firebaseapp.com",
  projectId: "alevel-report",
  storageBucket: "alevel-report.firebasestorage.app",
  messagingSenderId: "794739539381",
  appId: "1:794739539381:web:f9b549b954a8558eb92dfc",
  measurementId: "G-8QGZLMC5G1"
};
firebase.initializeApp(firebaseConfig);
const fbAuth = firebase.auth();
const db = firebase.firestore();
const DATA_DOC = db.collection("schoolData").doc("main");
// Secondary app instance: lets an admin create a teacher's Firebase
// account without being signed out of their own admin session.
const fbSecondaryApp = firebase.initializeApp(firebaseConfig, "Secondary");
const fbSecondaryAuth = fbSecondaryApp.auth();

const CLASSES = ["S5", "S6"];
const TERMS = ["Term 1", "Term 2", "Term 3"];

const DEFAULT_SUBJECTS = [
  { id: "gp", name: "General Paper", code: "GP" },
  { id: "sicti", name: "Sub-ICT", code: "S-ICT" },
  { id: "math", name: "Mathematics", code: "MTC" },
  { id: "phy", name: "Physics", code: "PHY" },
  { id: "chem", name: "Chemistry", code: "CHM" },
  { id: "bio", name: "Biology", code: "BIO" },
  { id: "econ", name: "Economics", code: "ECN" },
  { id: "geo", name: "Geography", code: "GEO" },
  { id: "hist", name: "History", code: "HIST" },
  { id: "lit", name: "Literature in English", code: "LIT" },
];

const DEFAULT_SETTINGS = {
  schoolName: "Your School Name",
  schoolMotto: "",
  currentTerm: "Term 1",
  currentYear: String(new Date().getFullYear()),
  adminUid: "",
  adminEmail: "",
  lastPromotionDate: "",
  logoDataUrl: "",
  gradeScale: [
    { grade: "A", min: 80, points: 6 },
    { grade: "B", min: 70, points: 5 },
    { grade: "C", min: 60, points: 4 },
    { grade: "D", min: 50, points: 3 },
    { grade: "E", min: 40, points: 2 },
    { grade: "F", min: 0, points: 0 },
  ],
};

function emptyData(){
  return { students: [], subjects: DEFAULT_SUBJECTS, teachers: [], grades: {}, remarks: {}, settings: { ...DEFAULT_SETTINGS } };
}
function uid(){ return Math.random().toString(36).slice(2,10); }
function gradeKey(sid, subId, term, year){ return `${sid}|${subId}|${term}|${year}`; }
function remarkKey(sid, term, year){ return `${sid}|${term}|${year}`; }
function isActiveStudent(s){ return s.status !== "graduated"; }
function computeGrade(score, scale){
  if (score === "" || score === undefined || score === null || isNaN(score)) return null;
  const s = Number(score);
  const sorted = [...scale].sort((a,b)=>b.min-a.min);
  for (const band of sorted) if (s >= band.min) return band;
  return sorted[sorted.length-1];
}
function esc(str){
  return String(str ?? "").replace(/[&<>"']/g, (c) => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
}
function sealInner(initials){
  const logo = DATA && DATA.settings && DATA.settings.logoDataUrl;
  return logo ? `<img class="seal-img" src="${logo}" alt="School logo" />` : esc(initials);
}
function resizeImageToDataUrl(file, maxDim, quality){
  maxDim = maxDim || 240; quality = quality || 0.82;
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onerror = () => reject(new Error("Could not read file"));
    reader.onload = () => {
      const img = new Image();
      img.onerror = () => reject(new Error("Could not load image"));
      img.onload = () => {
        let width = img.naturalWidth, height = img.naturalHeight;
        if (width > maxDim || height > maxDim){
          if (width >= height){ height = Math.round(height * (maxDim / width)); width = maxDim; }
          else { width = Math.round(width * (maxDim / height)); height = maxDim; }
        }
        const canvas = document.createElement("canvas");
        canvas.width = width; canvas.height = height;
        const ctx = canvas.getContext("2d");
        ctx.drawImage(img, 0, 0, width, height);
        resolve(canvas.toDataURL("image/jpeg", quality));
      };
      img.src = reader.result;
    };
    reader.readAsDataURL(file);
  });
}

let DATA = null;
let UI = { tab: "dashboard", saveState: "idle", studentQuery: "", studentStatusFilter: "active", modal: null, editingStudent: null,
  editingTeacher: null, gradeFilter: null, reportFilter: null };

// Admin/Teacher sessions now persist via Firebase Auth (they'll stay
// signed in across refreshes). Parent sessions are app-level only and
// reset on refresh, same as before.
let SESSION = { role: null, teacherId: null, studentId: null, step: "choose", selectedTeacherId: null, selectedStudentId: null, error: "" };

const ADMIN_NAV = [["dashboard","Dashboard"],["students","Students"],["subjects","Subjects"],["teachers","Teachers"],["grades","Grade Entry"],["reports","Report Cards"],["settings","Settings"]];
const TEACHER_NAV = [["dashboard","Dashboard"],["grades","Grade Entry"],["reports","Report Cards"]];
const PARENT_NAV = [["dashboard","Dashboard"],["reports","Report Cards"]];

async function loadData(){
  try{
    const snap = await DATA_DOC.get();
    if (snap.exists){
      const parsed = snap.data() || {};
      DATA = { ...emptyData(), ...parsed, settings: { ...DEFAULT_SETTINGS, ...(parsed.settings||{}) }, teachers: parsed.teachers || [] };
    } else {
      DATA = emptyData();
      await DATA_DOC.set(DATA);
    }
  } catch(e){
    console.error("Load failed", e);
    DATA = emptyData();
  }
}

async function persist(){
  UI.saveState = "saving";
  updateSaveIndicator();
  try{
    await DATA_DOC.set(DATA);
    UI.saveState = "saved";
    updateSaveIndicator();
    setTimeout(()=>{ UI.saveState="idle"; updateSaveIndicator(); }, 1200);
  } catch(e){
    UI.saveState = "idle";
    updateSaveIndicator();
    console.error("Save failed", e);
    alert("Could not save changes — check your connection and try again.");
  }
}

// Drives startup and every sign-in/sign-out. We keep an anonymous
// Firebase session active whenever nobody is logged in, purely so
// Firestore reads work for the login screen and the Parent Portal.
let authReady = false;
fbAuth.onAuthStateChanged(async (user) => {
  if (!user){
    try{ await fbAuth.signInAnonymously(); } catch(err){ console.error("Anonymous sign-in failed", err); }
    return; // this handler will fire again once the anonymous user is set
  }

  if (!authReady){
    authReady = true;
    await loadData();
    UI.gradeFilter = { klass: CLASSES[0], subjectId: DATA.subjects[0]?.id || "", term: DATA.settings.currentTerm, year: DATA.settings.currentYear };
    UI.reportFilter = { studentId: DATA.students[0]?.id || "", term: DATA.settings.currentTerm, year: DATA.settings.currentYear };
  }

  if (user.isAnonymous){
    if (SESSION.role){ SESSION = { role:null, teacherId:null, studentId:null, step:"choose", selectedTeacherId:null, selectedStudentId:null, error:"" }; }
  } else if (DATA.settings.adminUid === user.uid){
    SESSION = { role:"admin", teacherId:null, studentId:null, step:"done", selectedTeacherId:null, selectedStudentId:null, error:"" };
    if (!currentNav().some(n=>n[0]===UI.tab)) UI.tab = "dashboard";
  } else {
    const t = DATA.teachers.find(t=>t.uid===user.uid);
    if (t){
      SESSION = { role:"teacher", teacherId:t.id, studentId:null, step:"done", selectedTeacherId:null, selectedStudentId:null, error:"" };
      if (!currentNav().some(n=>n[0]===UI.tab)) UI.tab = "grades";
    } else {
      // A signed-in Firebase user we don't recognize (e.g. a removed
      // teacher account). Sign them out rather than let them in.
      fbAuth.signOut();
      return;
    }
  }
  render();
});
function updateSaveIndicator(){
  const el = document.getElementById("save-indicator");
  if (!el) return;
  el.textContent = UI.saveState === "saving" ? "Saving…" : UI.saveState === "saved" ? "Saved ✓" : "All changes saved";
  el.className = "save-state" + (UI.saveState === "saving" ? " saving" : "");
}

function currentNav(){
  if (SESSION.role === "admin") return ADMIN_NAV;
  if (SESSION.role === "teacher") return TEACHER_NAV;
  return PARENT_NAV;
}
function currentTeacher(){ return DATA.teachers.find(t=>t.id===SESSION.teacherId) || null; }
function currentParentStudent(){ return DATA.students.find(s=>s.id===SESSION.studentId) || null; }

function setTab(tab){
  const allowed = currentNav().map(n=>n[0]);
  if (!allowed.includes(tab)) return;
  UI.tab = tab;
  render();
}

/* ----------------------------- Import / Export ----------------------------- */

function downloadBlob(blob, filename){
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click(); a.remove();
  setTimeout(()=>URL.revokeObjectURL(url), 1000);
}

function exportStudentsToExcel(){
  const rows = DATA.students.map(s=>({
    "Name": s.name,
    "Admission No": s.admNo || "",
    "Class": s.klass,
    "Stream": s.stream || "",
    "Guardian Contact": s.guardianContact || "",
    "Subjects": (s.subjectIds||[]).map(id => DATA.subjects.find(sub=>sub.id===id)?.code).filter(Boolean).join(", "),
    "Status": isActiveStudent(s) ? "Active" : "Graduated",
    "Graduated Year": s.graduatedYear || ""
  }));
  const ws = XLSX.utils.json_to_sheet(rows.length ? rows : [{ "Name":"", "Admission No":"", "Class":"", "Stream":"", "Guardian Contact":"", "Subjects":"", "Status":"", "Graduated Year":"" }]);
  ws["!cols"] = [{wch:24},{wch:16},{wch:8},{wch:12},{wch:20},{wch:30},{wch:12},{wch:14}];
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, "Students");
  XLSX.writeFile(wb, `students-${DATA.settings.currentYear||""}.xlsx`);
}

function importStudentsFromExcel(file){
  const reader = new FileReader();
  reader.onload = (e) => {
    try{
      const wb = XLSX.read(e.target.result, { type: "array" });
      const ws = wb.Sheets[wb.SheetNames[0]];
      const rows = XLSX.utils.sheet_to_json(ws, { defval: "" });
      let added = 0, updated = 0, skipped = 0;
      rows.forEach(row=>{
        const name = String(row["Name"] || "").trim();
        if (!name){ skipped++; return; }
        const admNo = String(row["Admission No"] || "").trim();
        const klassRaw = String(row["Class"] || "").trim();
        const klass = CLASSES.includes(klassRaw) ? klassRaw : CLASSES[0];
        const stream = String(row["Stream"] || "").trim();
        const guardianContact = String(row["Guardian Contact"] || "").trim();
        const subjectCodes = String(row["Subjects"] || "").split(",").map(x=>x.trim().toUpperCase()).filter(Boolean);
        const subjectIds = DATA.subjects.filter(sub => subjectCodes.includes(sub.code.toUpperCase())).map(sub=>sub.id);
        const hasStatusCol = Object.prototype.hasOwnProperty.call(row, "Status");
        const statusRaw = hasStatusCol ? String(row["Status"] || "").trim().toLowerCase() : "";
        const existing = admNo
          ? DATA.students.find(s => s.admNo && s.admNo === admNo)
          : DATA.students.find(s => s.name.toLowerCase() === name.toLowerCase());
        if (existing){
          existing.name = name;
          existing.admNo = admNo || existing.admNo;
          existing.klass = klass;
          existing.stream = stream;
          existing.guardianContact = guardianContact;
          if (subjectCodes.length) existing.subjectIds = subjectIds;
          if (hasStatusCol){
            existing.status = statusRaw === "graduated" ? "graduated" : "active";
            existing.graduatedYear = statusRaw === "graduated" ? (String(row["Graduated Year"]||"").trim() || existing.graduatedYear || "") : "";
          }
          updated++;
        } else {
          const status = statusRaw === "graduated" ? "graduated" : "active";
          const graduatedYear = status === "graduated" ? String(row["Graduated Year"]||"").trim() : "";
          DATA.students.push({ id: uid(), name, admNo, klass, stream, guardianContact, subjectIds, status, graduatedYear });
          added++;
        }
      });
      persist(); render();
      alert(`Import complete: ${added} added, ${updated} updated${skipped ? `, ${skipped} skipped (no name)` : ""}.`);
    } catch(err){
      console.error(err);
      alert("Could not read that file. Make sure it's a valid Excel file with columns like Name, Admission No, Class, Stream, Guardian Contact, Subjects (e.g. an export from this system).");
    }
  };
  reader.readAsArrayBuffer(file);
}

function exportGradesToExcel(){
  const f = UI.gradeFilter;
  const subject = DATA.subjects.find(s=>s.id===f.subjectId);
  const roster = DATA.students.filter(s => s.klass===f.klass && isActiveStudent(s) && (s.subjectIds||[]).includes(f.subjectId));
  const rows = roster.map(s=>{
    const g = DATA.grades[gradeKey(s.id, f.subjectId, f.term, f.year)] || {};
    return { "Admission No": s.admNo || "", "Name": s.name, "Score (%)": g.score ?? "", "Comment": g.comment ?? "" };
  });
  const ws = XLSX.utils.json_to_sheet(rows.length ? rows : [{ "Admission No":"", "Name":"", "Score (%)":"", "Comment":"" }]);
  ws["!cols"] = [{wch:16},{wch:24},{wch:12},{wch:34}];
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, `${f.klass}-${subject?.code||"subject"}`.slice(0,31));
  const filename = `grades-${f.klass}-${subject?.code||"subject"}-${f.term}-${f.year}.xlsx`.replace(/\s+/g,"_");
  XLSX.writeFile(wb, filename);
}

function importGradesFromExcel(file){
  const f = UI.gradeFilter;
  const roster = DATA.students.filter(s => s.klass===f.klass && isActiveStudent(s) && (s.subjectIds||[]).includes(f.subjectId));
  const reader = new FileReader();
  reader.onload = (e) => {
    try{
      const wb = XLSX.read(e.target.result, { type: "array" });
      const ws = wb.Sheets[wb.SheetNames[0]];
      const rows = XLSX.utils.sheet_to_json(ws, { defval: "" });
      let updated = 0, skipped = 0;
      rows.forEach(row=>{
        const admNo = String(row["Admission No"] || "").trim();
        const name = String(row["Name"] || "").trim();
        const student = roster.find(s => (admNo && s.admNo === admNo) || (!admNo && name && s.name.toLowerCase() === name.toLowerCase()));
        if (!student){ skipped++; return; }
        const score = String(row["Score (%)"] ?? "").trim();
        const comment = String(row["Comment"] ?? "").trim();
        DATA.grades[gradeKey(student.id, f.subjectId, f.term, f.year)] = { score, comment };
        updated++;
      });
      persist(); render();
      alert(`Import complete: ${updated} score(s) updated${skipped ? `, ${skipped} row(s) skipped (student not in this roster)` : ""}.`);
    } catch(err){
      console.error(err);
      alert("Could not read that file. Make sure it's a valid Excel file with columns Admission No / Name, Score (%), Comment — e.g. an export from this system.");
    }
  };
  reader.readAsArrayBuffer(file);
}

async function exportReportAs(format){
  const node = document.querySelector(".report-card");
  if (!node || typeof html2canvas === "undefined") return;
  const btn = document.querySelector(`[data-action="export-report-${format}"]`);
  const originalLabel = btn ? btn.textContent : "";
  if (btn){ btn.textContent = "Preparing…"; btn.disabled = true; }
  try{
    const canvas = await html2canvas(node, { scale: 2, backgroundColor: "#ffffff", useCORS: true });
    const f = UI.reportFilter;
    const student = DATA.students.find(s=>s.id===f.studentId);
    const base = `report-${(student?.name||"student")}-${f.term}-${f.year}`.replace(/[^a-z0-9]+/gi,"_");
    if (format === "jpg"){
      canvas.toBlob(blob => { if (blob) downloadBlob(blob, `${base}.jpg`); }, "image/jpeg", 0.95);
    } else if (format === "pdf"){
      const { jsPDF } = window.jspdf;
      const pdf = new jsPDF({ orientation: "portrait", unit: "pt", format: "a4" });
      const pageW = pdf.internal.pageSize.getWidth();
      const pageH = pdf.internal.pageSize.getHeight();
      const margin = 30;
      const maxW = pageW - margin*2;
      const maxH = pageH - margin*2;
      let imgW = maxW;
      let imgH = (canvas.height * imgW) / canvas.width;
      if (imgH > maxH){ imgH = maxH; imgW = (canvas.width * imgH) / canvas.height; }
      const x = (pageW - imgW) / 2;
      const imgData = canvas.toDataURL("image/jpeg", 0.95);
      pdf.addImage(imgData, "JPEG", x, margin, imgW, imgH);
      pdf.save(`${base}.pdf`);
    }
  } catch(err){
    console.error(err);
    alert("Could not export the report card. Please try again.");
  } finally {
    if (btn){ btn.textContent = originalLabel; btn.disabled = false; }
  }
}

/* ----------------------------- Grade entry ----------------------------- */

function renderGrades(){
  const f = UI.gradeFilter;
  const isTeacher = SESSION.role === "teacher";
  const t = currentTeacher();
  const availableSubjects = isTeacher ? DATA.subjects.filter(s=>(t?.subjectIds||[]).includes(s.id)) : DATA.subjects;

  if (isTeacher && availableSubjects.length === 0){
    return pageHeader("Assessment","Grade Entry") + `<div class="card empty-note">You have no subjects assigned yet. Ask your admin to assign subjects to your account in the Teachers tab.</div>`;
  }

  const roster = DATA.students.filter(s => s.klass===f.klass && isActiveStudent(s) && (s.subjectIds||[]).includes(f.subjectId));
  const subject = DATA.subjects.find(s=>s.id===f.subjectId);

  const filterBar = `
    <div class="card form-inline" style="margin-bottom:18px;">
      <div class="form-row"><div class="form-label">Class</div>
        <select id="gf-klass">${CLASSES.map(c=>`<option ${c===f.klass?"selected":""}>${c}</option>`).join("")}</select></div>
      <div class="form-row"><div class="form-label">Subject</div>
        <select id="gf-subject">${availableSubjects.map(s=>`<option value="${s.id}" ${s.id===f.subjectId?"selected":""}>${esc(s.name)}</option>`).join("")}</select></div>
      <div class="form-row"><div class="form-label">Term</div>
        <select id="gf-term">${TERMS.map(t2=>`<option ${t2===f.term?"selected":""}>${t2}</option>`).join("")}</select></div>
      <div class="form-row"><div class="form-label">Year</div>
        <input id="gf-year" style="width:90px;" value="${esc(f.year)}" /></div>
    </div>`;

  let body;
  if (!f.subjectId){
    body = `<div class="card empty-note">Add a subject first (Subjects tab).</div>`;
  } else if (roster.length===0){
    body = `<div class="card empty-note">No ${esc(f.klass)} students are registered for ${esc(subject?.name||"")}. Assign the subject to students in the Students tab.</div>`;
  } else {
    body = `
      <div class="card card-flush">
        <table>
          <thead><tr><th>Student</th><th style="width:110px;">Score (%)</th><th style="width:70px;">Grade</th><th>Teacher comment</th></tr></thead>
          <tbody>
            ${roster.map(s=>{
              const g = DATA.grades[gradeKey(s.id, f.subjectId, f.term, f.year)] || {};
              const gr = computeGrade(g.score, DATA.settings.gradeScale);
              return `
                <tr data-student-row="${s.id}">
                  <td style="font-weight:600;">${esc(s.name)}</td>
                  <td><input type="number" min="0" max="100" style="padding:6px 8px;" data-grade-score="${s.id}" value="${g.score ?? ""}" /></td>
                  <td><span class="grade-badge" data-grade-badge="${s.id}">${gr ? `<span class="pill dark">${gr.grade}</span>` : "—"}</span></td>
                  <td><input style="padding:6px 8px;" data-grade-comment="${s.id}" value="${esc(g.comment)}" placeholder="Optional remark" /></td>
                </tr>`;
            }).join("")}
          </tbody>
        </table>
        <div style="padding:14px;border-top:1px solid var(--line);display:flex;justify-content:flex-end;">
          <button class="btn-primary" data-action="save-grades">Save scores</button>
        </div>
      </div>`;
  }

  const gradeAction = f.subjectId ? `
    <div style="display:flex;gap:8px;flex-wrap:wrap;">
      <button class="btn-secondary" data-action="export-grades-excel">⬇ Export Excel</button>
      <button class="btn-secondary" data-action="import-grades-excel">⬆ Import Excel</button>
      <input type="file" id="import-grades-input" accept=".xlsx,.xls,.csv" style="display:none;" />
    </div>` : "";

  return pageHeader("Assessment","Grade Entry", gradeAction) + filterBar + body;
}

/* ----------------------------- Reports ----------------------------- */

function renderReports(){
  const f = UI.reportFilter;
  const isParent = SESSION.role === "parent";
  if (isParent) { f.studentId = SESSION.studentId; }
  const student = DATA.students.find(s=>s.id===f.studentId);
  const action = student ? `
    <div class="no-print" style="display:flex;gap:8px;flex-wrap:wrap;">
      <button class="btn-secondary" data-action="export-report-jpg">⬇ Export JPG</button>
      <button class="btn-secondary" data-action="export-report-pdf">⬇ Export PDF</button>
      <button class="btn-primary" data-action="print-report">Print / Save as PDF</button>
    </div>` : "";

  const filterBar = `
    <div class="card form-inline no-print" style="margin-bottom:20px;">
      <div class="form-row" style="min-width:220px;"><div class="form-label">Student</div>
        ${isParent
          ? `<div style="padding:9px 10px;background:var(--paper-dim);border-radius:7px;font-size:13.5px;font-weight:600;">${esc(student?.name||"")}${student?` (${esc(student.klass)})`:""}</div>`
          : `<select id="rf-student">
              ${DATA.students.length===0 ? `<option value="">No students yet</option>` : ""}
              ${DATA.students.map(s=>`<option value="${s.id}" ${s.id===f.studentId?"selected":""}>${esc(s.name)} (${esc(s.klass)}${isActiveStudent(s)?"":" · Graduated"})</option>`).join("")}
            </select>`}
      </div>
      <div class="form-row"><div class="form-label">Term</div>
        <select id="rf-term">${TERMS.map(t=>`<option ${t===f.term?"selected":""}>${t}</option>`).join("")}</select></div>
      <div class="form-row"><div class="form-label">Year</div>
        <input id="rf-year" style="width:90px;" value="${esc(f.year)}" /></div>
    </div>`;

  if (!student){
    return pageHeader("Output","Report Cards", action) + filterBar + `<div class="card empty-note">Add a student to generate a report card.</div>`;
  }

  const rows = (student.subjectIds||[]).map(sid=>{
    const subject = DATA.subjects.find(s=>s.id===sid);
    if (!subject) return null;
    const g = DATA.grades[gradeKey(student.id, sid, f.term, f.year)];
    const grade = g ? computeGrade(g.score, DATA.settings.gradeScale) : null;
    return { subject, score: g?.score, comment: g?.comment, grade };
  }).filter(Boolean);

  const scored = rows.filter(r=>r.grade);
  const totalPoints = scored.reduce((sum,r)=>sum+r.grade.points,0);
  const avgScore = scored.length ? (scored.reduce((sum,r)=>sum+Number(r.score),0)/scored.length).toFixed(1) : null;

  const remarks = DATA.remarks[remarkKey(student.id, f.term, f.year)] || { classTeacher:"", headTeacher:"" };
  const initials = (DATA.settings.schoolName||"S").trim().slice(0,2).toUpperCase();

  const reportHtml = `
    <div class="report-card">
      <div class="report-head">
        <div>
          <div class="report-school">${esc(DATA.settings.schoolName)}</div>
          ${DATA.settings.schoolMotto ? `<div class="report-motto">${esc(DATA.settings.schoolMotto)}</div>` : ""}
          <div class="report-sub">Advanced Level Report Card — ${esc(f.term)}, ${esc(f.year)}</div>
        </div>
        <div class="report-seal">${sealInner(initials)}</div>
      </div>
      <div style="display:flex;gap:20px;align-items:flex-start;">
        <div class="report-meta" style="flex:1;margin-bottom:0;">
          <div><b>Name:</b> ${esc(student.name)}</div>
          <div><b>Admission No.:</b> ${esc(student.admNo)||"—"}</div>
          <div><b>Class:</b> ${esc(student.klass)}${student.stream?` — ${esc(student.stream)}`:""}</div>
          <div><b>Subject combination:</b> ${(student.subjectIds||[]).length} subjects</div>
        </div>
        ${student.photoDataUrl ? `<div style="width:76px;height:96px;border-radius:6px;overflow:hidden;border:1px solid var(--line);flex-shrink:0;">
            <img src="${student.photoDataUrl}" style="width:100%;height:100%;object-fit:cover;display:block;" alt="${esc(student.name)}" />
          </div>` : ""}
      </div>
      <div style="margin-bottom:22px;"></div>
      <table class="report-table">
        <thead><tr><th>Subject</th><th>Score</th><th>Grade</th><th>Points</th><th>Comment</th></tr></thead>
        <tbody>
          ${rows.length===0 ? `<tr><td colspan="5" style="text-align:center;color:#9a9184;font-family:var(--font-body);">No subjects assigned to this student.</td></tr>` :
            rows.map(r=>`
              <tr>
                <td class="name-cell">${esc(r.subject.name)}</td>
                <td>${r.score!==undefined && r.score!=="" ? esc(r.score) : "—"}</td>
                <td>${r.grade ? esc(r.grade.grade) : "—"}</td>
                <td>${r.grade ? esc(r.grade.points) : "—"}</td>
                <td style="font-family:var(--font-body);">${esc(r.comment)||""}</td>
              </tr>`).join("")}
        </tbody>
      </table>
      <div class="report-totals">
        <div><b>Total points:</b> ${totalPoints}</div>
        ${avgScore ? `<div><b>Average score:</b> ${avgScore}%</div>` : ""}
      </div>
      ${isParent ? "" : `
      <div class="no-print" style="display:grid;gap:10px;margin-bottom:10px;">
        <div class="form-row"><div class="form-label">Class teacher's comment</div>
          <textarea id="remark-class" style="min-height:54px;">${esc(remarks.classTeacher)}</textarea></div>
        <div class="form-row"><div class="form-label">Head teacher's comment</div>
          <textarea id="remark-head" style="min-height:54px;">${esc(remarks.headTeacher)}</textarea></div>
      </div>`}
      <div style="font-size:13.5px;margin-top:18px;">
        <div style="margin-bottom:12px;"><b>Class teacher's comment:</b> <span id="remark-class-display">${esc(remarks.classTeacher)||"—"}</span></div>
        <div style="margin-bottom:24px;"><b>Head teacher's comment:</b> <span id="remark-head-display">${esc(remarks.headTeacher)||"—"}</span></div>
        <div class="sign-row">
          <div class="sign-line">Class teacher's signature</div>
          <div class="sign-line" style="text-align:right;">Head teacher's signature</div>
        </div>
      </div>
    </div>`;

  return pageHeader("Output","Report Cards", action) + filterBar + reportHtml;
}

        <div class="modal" data-stop-close>
          <div class="modal-head">
            <h3 class="section-title" style="margin:0;">${isNew?"Add teacher":"Edit teacher"}</h3>
            <button class="modal-close" data-action="close-modal">×</button>
          </div>
          ${teacherModalHtml(UI.editingTeacher)}
        </div>
      </div>`;
  }
  return "";
}

/* ----------------------------- Event handling ----------------------------- */

function attachGlobalHandlers(){
  document.body.onclick = (e) => {
    const el = e.target.closest("[data-action]");
    if (!el) return;
    const action = el.dataset.action;

    // ---- Login flow ----
    if (action === "choose-role") {
      SESSION.error = "";
      const role = el.dataset.role;
      if (role === "admin") {
        SESSION.step = DATA.settings.adminEmail ? "admin-login" : "admin-setup";
      } else if (role === "parent") {
        SESSION.step = "parent-lookup";
      } else {
        SESSION.step = "teacher-login";
      }
      render();
      return;
    }
    if (action === "back-to-role-choice") { SESSION = { role:null, teacherId:null, studentId:null, step:"choose", selectedTeacherId:null, selectedStudentId:null, error:"" }; render(); return; }
    if (action === "submit-admin-login") {
      const email = (document.getElementById("admin-email-input").value || "").trim();
      const pass = document.getElementById("pin-input").value;
      if (!email || !pass) { SESSION.error = "Enter your email and password."; render(); return; }
      SESSION.error = "";
      fbAuth.signInWithEmailAndPassword(email, pass).catch(()=>{
        SESSION.error = "Incorrect email or password.";
        render();
      });
      return;
    }
    if (action === "submit-admin-setup") {
      const email = (document.getElementById("setup-email").value || "").trim();
      const p1 = document.getElementById("setup-pass1").value;
      const p2 = document.getElementById("setup-pass2").value;
      if (!email) { SESSION.error = "Enter an email address."; render(); return; }
      if (p1.length < 6) { SESSION.error = "Password must be at least 6 characters."; render(); return; }
      if (p1 !== p2) { SESSION.error = "Passwords don't match. Try again."; render(); return; }
      fbAuth.createUserWithEmailAndPassword(email, p1).then((cred)=>{
        DATA.settings.adminUid = cred.user.uid;
        DATA.settings.adminEmail = email;
        persist();
      }).catch(err=>{
        SESSION.error = err.message || "Could not create the admin account.";
        render();
      });
      return;
    }
    if (action === "submit-teacher-login") {
      const email = (document.getElementById("teacher-email-input").value || "").trim();
      const pass = document.getElementById("pin-input").value;
      if (!email || !pass) { SESSION.error = "Enter your email and password."; render(); return; }
      SESSION.error = "";
      fbAuth.signInWithEmailAndPassword(email, pass).catch(()=>{
        SESSION.error = "Incorrect email or password.";
        render();
      });
      return;
    }
    if (action === "forgot-password") {
      const field = document.getElementById(el.dataset.field);
      const email = (field?.value || "").trim();
      if (!email) { SESSION.error = "Enter your email above first, then tap \"Forgot password?\" again."; render(); return; }
      fbAuth.sendPasswordResetEmail(email).then(()=>{
        alert(`Password reset email sent to ${email}.`);
      }).catch(err=>{
        SESSION.error = err.message || "Could not send a reset email.";
        render();
      });
      return;
    }
    if (action === "submit-parent-lookup") {
      const val = (document.getElementById("parent-admno-input").value || "").trim();
      if (!val) { SESSION.error = "Enter an admission number."; render(); return; }
      const student = DATA.students.find(s => (s.admNo||"").trim().toLowerCase() === val.toLowerCase());
      if (!student) { SESSION.error = "No student found with that admission number. Check with the school office."; render(); return; }
      if (student.parentPin) {
        SESSION.selectedStudentId = student.id; SESSION.step = "parent-pin"; SESSION.error = "";
      } else {
        SESSION.role = "parent"; SESSION.studentId = student.id; SESSION.step = "done"; SESSION.error = "";
        UI.tab = "dashboard";
        UI.reportFilter = { studentId: student.id, term: DATA.settings.currentTerm, year: DATA.settings.currentYear };
      }
      render();
      return;
    }
    if (action === "submit-parent-pin") {
      const val = document.getElementById("pin-input").value;
      const student = DATA.students.find(s=>s.id===SESSION.selectedStudentId);
      if (student && val === student.parentPin) {
        SESSION.role = "parent"; SESSION.studentId = student.id; SESSION.step = "done"; SESSION.error = "";
        UI.tab = "dashboard";
        UI.reportFilter = { studentId: student.id, term: DATA.settings.currentTerm, year: DATA.settings.currentYear };
      } else {
        SESSION.error = "Incorrect PIN. Try again.";
      }
      render();
      return;
    }
    if (action === "logout") { logout(); return; }

    // ---- Main app ----
    if (action === "set-tab") { setTab(el.dataset.tab); return; }
    if (action === "new-student") { UI.modal="student"; UI.editingStudent = { id: uid(), name:"", admNo:"", klass:CLASSES[0], stream:"", guardianContact:"", parentPin:"", photoDataUrl:"", subjectIds:[] }; render(); return; }
    if (action === "edit-student") { UI.modal="student"; UI.editingStudent = { ...DATA.students.find(s=>s.id===el.dataset.id) }; render(); return; }
    if (action === "delete-student") {
      if (confirm("Remove this student? Their recorded grades will be kept but unlinked.")){
        DATA.students = DATA.students.filter(s=>s.id!==el.dataset.id);
        persist(); render();
      }
      return;
    }
    if (action === "new-teacher") { UI.modal="teacher"; UI.editingTeacher = { id: uid(), name:"", email:"", uid:"", subjectIds:[] }; render(); return; }
    if (action === "edit-teacher") { UI.modal="teacher"; UI.editingTeacher = { ...DATA.teachers.find(t=>t.id===el.dataset.id) }; render(); return; }
    if (action === "delete-teacher") {
      if (confirm("Remove this teacher account? They'll immediately lose access here. (Their Firebase sign-in still exists — delete it from the Firebase console too if you want it fully gone.)")){
        DATA.teachers = DATA.teachers.filter(t=>t.id!==el.dataset.id);
        persist(); render();
      }
      return;
    }
    if (action === "close-modal" || action === "close-modal-overlay") {
      if (action==="close-modal-overlay" && e.target.closest("[data-stop-close]")) return;
      UI.modal = null; UI.editingStudent = null; UI.editingTeacher = null; render(); return;
    }
    if (action === "toggle-subject") {
      const sid = el.dataset.sid;
      const set = new Set(UI.editingStudent.subjectIds||[]);
      set.has(sid) ? set.delete(sid) : set.add(sid);
      UI.editingStudent.subjectIds = [...set];
      el.classList.toggle("active");
      return;
    }
    if (action === "toggle-teacher-subject") {
      const sid = el.dataset.sid;
      const set = new Set(UI.editingTeacher.subjectIds||[]);
      set.has(sid) ? set.delete(sid) : set.add(sid);
      UI.editingTeacher.subjectIds = [...set];
      el.classList.toggle("active");
      return;
    }
    if (action === "save-student") {
      const name = document.getElementById("f-name").value.trim();
      if (!name) return;
      UI.editingStudent.name = name;
      UI.editingStudent.admNo = document.getElementById("f-adm").value.trim();
      UI.editingStudent.klass = document.getElementById("f-klass").value;
      UI.editingStudent.stream = document.getElementById("f-stream").value.trim();
      UI.editingStudent.guardianContact = document.getElementById("f-guardian").value.trim();
      UI.editingStudent.parentPin = document.getElementById("f-parentpin").value.trim();
      const exists = DATA.students.some(s=>s.id===UI.editingStudent.id);
      DATA.students = exists ? DATA.students.map(s=>s.id===UI.editingStudent.id?UI.editingStudent:s) : [...DATA.students, UI.editingStudent];
      UI.modal = null; UI.editingStudent = null;
      persist(); render();
      return;
    }
    if (action === "save-teacher") {
      const name = document.getElementById("t-name").value.trim();
      if (!name) return;
      const exists = DATA.teachers.some(t=>t.id===UI.editingTeacher.id);
      UI.editingTeacher.name = name;
      if (exists){
        DATA.teachers = DATA.teachers.map(t=>t.id===UI.editingTeacher.id ? { ...t, name: UI.editingTeacher.name, subjectIds: UI.editingTeacher.subjectIds } : t);
        UI.modal = null; UI.editingTeacher = null;
        persist(); render();
        return;
      }
      const email = document.getElementById("t-email").value.trim();
      const password = document.getElementById("t-password").value;
      if (!email) { alert("Enter an email address for this teacher."); return; }
      if (!password || password.length < 6) { alert("Choose a temporary password of at least 6 characters."); return; }
      fbSecondaryAuth.createUserWithEmailAndPassword(email, password).then(async (cred)=>{
        UI.editingTeacher.email = email;
        UI.editingTeacher.uid = cred.user.uid;
        await fbSecondaryAuth.signOut();
        DATA.teachers = [...DATA.teachers, UI.editingTeacher];
        UI.modal = null; UI.editingTeacher = null;
        persist(); render();
      }).catch(err=>{
        alert("Could not create that teacher's account: " + (err.message || err));
      });
      return;
    }
    if (action === "add-subject") {
      const name = document.getElementById("new-subject-name").value.trim();
      const code = document.getElementById("new-subject-code").value.trim();
      if (!name || !code) return;
      DATA.subjects = [...DATA.subjects, { id: uid(), name, code: code.toUpperCase() }];
      persist(); render();
      return;
    }
    if (action === "delete-subject") {
      if (confirm("Remove this subject? Recorded scores for it will be kept but hidden.")){
        DATA.subjects = DATA.subjects.filter(s=>s.id!==el.dataset.id);
        persist(); render();
      }
      return;
    }
    if (action === "save-grades") {
      const f = UI.gradeFilter;
      const roster = DATA.students.filter(s => s.klass===f.klass && isActiveStudent(s) && (s.subjectIds||[]).includes(f.subjectId));
      roster.forEach(s=>{
        const scoreEl = document.querySelector(`[data-grade-score="${s.id}"]`);
        const commentEl = document.querySelector(`[data-grade-comment="${s.id}"]`);
        DATA.grades[gradeKey(s.id, f.subjectId, f.term, f.year)] = { score: scoreEl.value, comment: commentEl.value };
      });
      persist(); render();
      return;
    }
    if (action === "print-report") { window.print(); return; }
    if (action === "export-report-pdf") { exportReportAs("pdf"); return; }
    if (action === "export-report-jpg") { exportReportAs("jpg"); return; }
    if (action === "export-students-excel") { exportStudentsToExcel(); return; }
    if (action === "import-students-excel") { document.getElementById("import-students-input")?.click(); return; }
    if (action === "export-grades-excel") { exportGradesToExcel(); return; }
    if (action === "import-grades-excel") { document.getElementById("import-grades-input")?.click(); return; }
    if (action === "add-band") {
      DATA.settings.gradeScale = [...DATA.settings.gradeScale, { grade:"", min:0, points:0 }];
      render();
      return;
    }
    if (action === "remove-band") {
      const i = Number(el.dataset.i);
      DATA.settings.gradeScale = DATA.settings.gradeScale.filter((_,idx)=>idx!==i);
      render();
      return;
    }
    if (action === "save-settings") { saveSettingsFromForm(); return; }
    if (action === "run-promotion") { runPromotion(); return; }
    if (action === "upload-logo") { document.getElementById("s-logo-input")?.click(); return; }
    if (action === "remove-logo") { DATA.settings.logoDataUrl = ""; persist(); render(); return; }
    if (action === "upload-student-photo") { document.getElementById("student-photo-input")?.click(); return; }
    if (action === "remove-student-photo") { if (UI.editingStudent) UI.editingStudent.photoDataUrl = ""; render(); return; }
  };

  // Live grade-badge update while typing scores
  document.body.oninput = (e) => {
    if (e.target.matches("[data-grade-score]")) {
      const sid = e.target.dataset.gradeScore;
      const gr = computeGrade(e.target.value, DATA.settings.gradeScale);
      const badge = document.querySelector(`[data-grade-badge="${sid}"]`);
      if (badge) badge.innerHTML = gr ? `<span class="pill dark">${esc(gr.grade)}</span>` : "—";
    }
    if (e.target.id === "student-search") {
      UI.studentQuery = e.target.value;
      renderStudentsTableOnly();
    }
    if (e.target.id === "remark-class" || e.target.id === "remark-head") {
      const disp = document.getElementById(e.target.id + "-display");
      if (disp) disp.textContent = e.target.value || "—";
    }
  };

  document.body.onchange = (e) => {
    if (e.target.id === "s-logo-input") {
      const file = e.target.files[0];
      e.target.value = "";
      if (!file) return;
      resizeImageToDataUrl(file, 240, 0.85).then(dataUrl => {
        DATA.settings.logoDataUrl = dataUrl;
        persist(); render();
      }).catch(err => { console.error(err); alert("Could not load that image. Please try a different file."); });
      return;
    }
    if (e.target.id === "student-photo-input") {
      const file = e.target.files[0];
      e.target.value = "";
      if (!file || !UI.editingStudent) return;
      resizeImageToDataUrl(file, 220, 0.82).then(dataUrl => {
        UI.editingStudent.photoDataUrl = dataUrl;
        render();
      }).catch(err => { console.error(err); alert("Could not load that image. Please try a different file."); });
      return;
    }
    if (e.target.id === "student-status-filter") {
      UI.studentStatusFilter = e.target.value;
      render();
      return;
    }
    if (e.target.id === "import-students-input") {
      const file = e.target.files[0];
      if (file) importStudentsFromExcel(file);
      e.target.value = "";
      return;
    }
    if (e.target.id === "import-grades-input") {
      const file = e.target.files[0];
      if (file) importGradesFromExcel(file);
      e.target.value = "";
      return;
    }
    if (["gf-klass","gf-subject","gf-term","gf-year"].includes(e.target.id)) {
      UI.gradeFilter = {
        klass: document.getElementById("gf-klass").value,
        subjectId: document.getElementById("gf-subject").value,
        term: document.getElementById("gf-term").value,
        year: document.getElementById("gf-year").value,
      };
      render();
    }
    if (["rf-student","rf-term","rf-year"].includes(e.target.id)) {
      UI.reportFilter = {
        studentId: document.getElementById("rf-student").value,
        term: document.getElementById("rf-term").value,
        year: document.getElementById("rf-year").value,
      };
      render();
    }
  };

  document.body.addEventListener("focusout", (e) => {
    if (e.target.id === "remark-class" || e.target.id === "remark-head") {
      saveRemarkFromForm();
    }
  });
}

function saveRemarkFromForm(){
  const f = UI.reportFilter;
  const student = DATA.students.find(s=>s.id===f.studentId);
  if (!student) return;
  const classTeacher = document.getElementById("remark-class")?.value || "";
  const headTeacher = document.getElementById("remark-head")?.value || "";
  DATA.remarks[remarkKey(student.id, f.term, f.year)] = { classTeacher, headTeacher };
  persist();
}

function saveSettingsFromForm(){
  const s = DATA.settings;
  s.schoolName = document.getElementById("s-name").value.trim() || "Your School Name";
  s.schoolMotto = document.getElementById("s-motto").value.trim();
  s.currentTerm = document.getElementById("s-term").value;
  s.currentYear = document.getElementById("s-year").value.trim();
  document.querySelectorAll("[data-band-row]").forEach(row=>{
    const i = Number(row.dataset.bandRow);
    const grade = row.querySelector('[data-band-field="grade"]').value;
    const min = Number(row.querySelector('[data-band-field="min"]').value);
    const points = Number(row.querySelector('[data-band-field="points"]').value);
    s.gradeScale[i] = { grade, min, points };
  });
  persist(); render();
}

function runPromotion(){
  const year = DATA.settings.currentYear;
  const nextYear = String(Number(year) + 1 || "");
  const s6 = DATA.students.filter(s => s.klass === "S6" && isActiveStudent(s));
  const s5 = DATA.students.filter(s => s.klass === "S5" && isActiveStudent(s));
  if (s5.length === 0 && s6.length === 0){
    alert("There are no active students to promote yet.");
    return;
  }
  const msg = `This will:\n\n`
    + `• Move ${s5.length} active S5 student(s) up to S6\n`
    + `• Mark ${s6.length} active S6 student(s) as graduated (Class of ${year})\n`
    + `• Advance the current year from ${year} to ${nextYear}, and reset the term to ${TERMS[0]}\n\n`
    + `All past grades and report cards are kept, and graduated students stay in your records. Continue?`;
  if (!confirm(msg)) return;

  DATA.students.forEach(s=>{
    if (!isActiveStudent(s)) return;
    if (s.klass === "S6"){ s.status = "graduated"; s.graduatedYear = year; }
    else if (s.klass === "S5"){ s.klass = "S6"; }
  });
  DATA.settings.currentYear = nextYear;
  DATA.settings.currentTerm = TERMS[0];
  DATA.settings.lastPromotionDate = new Date().toISOString();
  persist(); render();
  alert(`Promotion complete. Now in ${TERMS[0]}, ${nextYear}.`);
}

function renderStudentsTableOnly(){
  // lightweight partial refresh so the search box keeps focus while typing
  const main = document.querySelector("main");
  if (!main) return;
  main.innerHTML = renderStudents();
  const input = document.getElementById("student-search");
  if (input) { input.focus(); input.setSelectionRange(input.value.length, input.value.length); }
}

// Startup is driven by the fbAuth.onAuthStateChanged listener above —
// no explicit init() call needed.
</script>
</body>
</html>
